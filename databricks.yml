# This is a Databricks asset bundle definition for ghcn.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: ghcn
  uuid: e2fc4963-1f22-47ef-a184-c85831e6cc52

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-0284e1c5-e4b4.cloud.databricks.com
    variables:
      catalog: workspace
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-0284e1c5-e4b4.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/ridvan.gider@outlook.com to make sure we only have a single copy.
      root_path: /Workspace/Users/ridvan.gider@outlook.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: ridvan.gider@outlook.com
        level: CAN_MANAGE
